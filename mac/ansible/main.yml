---
- name: run playbook on localhost
  hosts: 127.0.0.1
  connection: local
  become: no

  pre_tasks:
    - name: Show sudo-requiring tasks
      debug:
        msg:
          - "The following task needs sudo (and your password):"
          - "  - Install homelab-ca root cert into System keychain (trusts woodpecker.home.arpa etc.)"
          - ""
          - "Answer yes on a fresh machine, or if it needs to be (re)installed."
          - "It is idempotent — answer no on routine subsequent runs."

    - name: Prompt whether to run sudo-requiring tasks
      pause:
        prompt: "Run sudo-requiring tasks? [y/N]"
        echo: yes
      register: run_sudo_prompt

    - name: Resolve run_sudo_tasks fact
      set_fact:
        run_sudo_tasks: "{{ (run_sudo_prompt.user_input | default('') | lower) in ['y', 'yes'] }}"

    - name: Prompt for sudo password
      pause:
        prompt: "sudo password"
        echo: no
      register: sudo_password_prompt
      when: run_sudo_tasks
      no_log: true

    - name: Set ansible_become_password
      set_fact:
        ansible_become_password: "{{ sudo_password_prompt.user_input }}"
      when: run_sudo_tasks
      no_log: true

    - name: Check if homebrew is installed
      stat:
        path: /opt/homebrew/bin/brew
      register: homebrew_check

    - name: Install homebrew
      shell: /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
      when:
        - not homebrew_check.stat.exists

    - name: check current shell
      shell: dscl . -read /Users/$USER UserShell
      register: user_shell
      changed_when: false

    - name: set zsh as default shell
      shell: chsh -s /bin/zsh
      when: '"/bin/zsh" not in user_shell.stdout'

    - name: Check if oh-my-zsh is installed
      stat:
        path: ~/.oh-my-zsh
      register: oh_my_zsh_check

    - name: Install oh-my-zsh
      shell: sh -c "$(curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)"
      when:
        - not oh_my_zsh_check.stat.exists

  tasks:

  - name: ensure trufflehog global ignore file exists
    copy:
      content: |
        ^\.git(/|$)
      dest: ~/.trufflehog-global-ignore
      force: no

  - name: install stuff from brewfile (no upgrade to avoid breaking ansible)
    shell: brew bundle --file={{ ansible_facts['env']['HOME'] }}/Brewfile --no-upgrade
    ignore_errors: yes

  - name: shim docker -> podman so non-interactive shells (e.g. make) resolve docker
    file:
      src: podman
      dest: /opt/homebrew/bin/docker
      state: link
      force: no

  - name: install commitlint dependencies globally
    shell: npm install -g @commitlint/cli @commitlint/config-conventional
    ignore_errors: yes

  - name: cloning zsh-autosuggestions
    git:
      repo=https://github.com/zsh-users/zsh-autosuggestions
      dest=~/.oh-my-zsh/custom/plugins/zsh-autosuggestions

  - name: cloning zsh-syntax-highlighting
    git:
      repo=https://github.com/zsh-users/zsh-syntax-highlighting
      dest=~/.oh-my-zsh/custom/plugins/zsh-syntax-highlighting

  - name: cloning p10k
    git:
      repo=https://github.com/romkatv/powerlevel10k.git
      dest=~/powerlevel10k

  - name: download MesloLGS NF Regular font
    get_url:
      url: https://github.com/romkatv/powerlevel10k-media/raw/master/MesloLGS%20NF%20Regular.ttf
      dest: ~/Library/Fonts/MesloLGS NF Regular.ttf

  - name: download MesloLGS NF Bold font
    get_url:
      url: https://github.com/romkatv/powerlevel10k-media/raw/master/MesloLGS%20NF%20Bold.ttf
      dest: ~/Library/Fonts/MesloLGS NF Bold.ttf

  - name: download MesloLGS NF Italic font
    get_url:
      url: https://github.com/romkatv/powerlevel10k-media/raw/master/MesloLGS%20NF%20Italic.ttf
      dest: ~/Library/Fonts/MesloLGS NF Italic.ttf

  - name: download MesloLGS NF Bold Italic font
    get_url:
      url: https://github.com/romkatv/powerlevel10k-media/raw/master/MesloLGS%20NF%20Bold%20Italic.ttf
      dest: ~/Library/Fonts/MesloLGS NF Bold Italic.ttf

  - name: configure git to use local hooks directory
    git_config:
      name: core.hooksPath
      value: ~/.git-hooks
      scope: global

  - name: configure git commit template
    git_config:
      name: commit.template
      value: ~/.git-commit-template
      scope: global

  - name: disable Spotlight keyboard shortcut (cmd+space)
    shell: |
      /usr/libexec/PlistBuddy -c "Set :AppleSymbolicHotKeys:64:enabled false" ~/Library/Preferences/com.apple.symbolichotkeys.plist 2>/dev/null || true
    ignore_errors: yes

  - name: check if homelab-ca root cert is in System keychain
    shell: security find-certificate -c homelab-ca /Library/Keychains/System.keychain
    register: homelab_ca_check
    failed_when: false
    changed_when: false

  - name: install homelab-ca root cert into System keychain (trusts woodpecker.home.arpa etc.)
    become: yes
    shell: >
      security add-trusted-cert -d -r trustRoot
      -k /Library/Keychains/System.keychain
      {{ playbook_dir }}/../certs/homelab-ca.pem
    when: run_sudo_tasks and homelab_ca_check.rc != 0

  - name: check if podman machine is reachable
    shell: podman machine ssh -- true
    register: podman_reachable
    changed_when: false
    failed_when: false

  - name: check if homelab-ca is in podman machine trust anchors
    shell: podman machine ssh -- test -f /etc/pki/ca-trust/source/anchors/homelab-ca.crt
    register: podman_homelab_cert
    changed_when: false
    failed_when: false
    when: podman_reachable.rc == 0

  # Restart the rootful podman service after updating trust anchors because
  # Go's crypto/x509 caches SystemCertPool once per process, so the long-running
  # service won't pick up the new bundle until it's restarted.
  - name: install homelab-ca into podman machine trust anchors (so podman push trusts registry.home.arpa)
    shell: |
      set -euo pipefail
      podman machine ssh -- sudo tee /etc/pki/ca-trust/source/anchors/homelab-ca.crt < {{ playbook_dir }}/../certs/homelab-ca.pem > /dev/null
      podman machine ssh -- sudo update-ca-trust
      podman machine ssh -- sudo systemctl restart podman.service
    when: podman_reachable.rc == 0 and (podman_homelab_cert.rc | default(1)) != 0

  - name: run link script
    shell: "{{ ansible_facts['env']['HOME'] }}/git/dotfiles/mac/link.sh"

  - name: check if rtk is installed
    shell: command -v rtk
    register: rtk_check
    failed_when: false
    changed_when: false

  - name: configure rtk hooks in global Claude Code settings (idempotent)
    shell: rtk init -g
    when: rtk_check.rc == 0
    changed_when: false

  - name: playbook complete
    debug:
      msg:
        - "✅ Playbook completed successfully!"
        - ""
        - "⚠️  Note: Package upgrades are not done automatically"
        - "   To upgrade packages, run: brew upgrade"
        - ""
        - "To import iTerm2 profile:"
        - "  1. Open iTerm2 > Settings > Profiles"
        - "  2. Click 'Other Actions' (bottom left) > Import JSON Profiles"
        - "  3. Select: ~/git/dotfiles/mac/iterm profile from dotfiles.json"
        - "  4. Set as default profile"
        - ""
        - "To configure Raycast (if installed):"
        - "  1. Open Raycast"
        - "  2. Go to Preferences > Hotkey"
        - "  3. Set to cmd+space (Spotlight shortcut is already disabled)"
        - "  4. Restart your Mac for Spotlight changes to take effect"
